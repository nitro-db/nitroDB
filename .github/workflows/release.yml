name: release

# Publishes NEDB on a version tag:
#   * PyPI — a universal pure-Python wheel (py3-none-any) + sdist, so `pip install
#            nedb-engine` works on EVERY platform/Python with no toolchain, and the
#            `nedbd` console script is always available.
#   * npm  — napi-rs prebuilt native node addon, package "nedb-engine".
# Secrets required: PYPI_API_TOKEN, NPM_TOKEN.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------- PyPI -----
  pypi:
    name: Publish to PyPI (universal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python3 tests/test_nedb.py        # 11/11 invariants gate the release
      - run: pip install --upgrade build twine
      - run: python -m build                   # -> py3-none-any wheel + sdist
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing --verbose dist/*

  # ---------------------------------------------------- Python native wheels ----
  # Builds the PyO3 (maturin) native extension for Linux / macOS / Windows.
  # These platform wheels are uploaded to PyPI alongside the universal pure-Python
  # wheel so `pip install nedb-engine` gets the Rust-accelerated core automatically.
  wheels:
    name: Python native wheel (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40        # fail fast if runner is unavailable — continue-on-error handles it
    continue-on-error: true    # slow/unavailable Mac runners don't block other platforms
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu, label: linux-x86_64   }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,   label: windows-x86_64}
          # macOS wheels (arm64 + x86_64) are built by Codemagic on M2 Mac Minis.
          # Removing them here eliminates the shared-runner queue wait entirely.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build nedbd-v2 (DAG engine binary)
        shell: bash
        run: |
          cd rust
          cargo build --release --bin nedbd --package nedb-core-v2 --target ${{ matrix.target }}
          cd ..
          EXT=""
          [[ "${{ matrix.os }}" == "windows-latest" ]] && EXT=".exe"
          BIN="rust/target/${{ matrix.target }}/release/nedbd${EXT}"
          DEST="python/nedb/nedbd-v2${EXT}"
          cp "$BIN" "$DEST"
          chmod +x "$DEST" || true
          echo "nedbd-v2 staged: $(ls -lh $DEST)"
      - name: Stage Python source + binary into maturin layout
        shell: bash
        run: |
          rm -rf rust/crates/nedb-py/python
          mkdir -p rust/crates/nedb-py/python
          cp -r python/nedb rust/crates/nedb-py/python/nedb
          find rust/crates/nedb-py/python/nedb -name "nedbd-v2*" -exec chmod +x {} \; || true
          echo "Staged $(find rust/crates/nedb-py/python/nedb -name '*.py' | wc -l) .py files"
          # Verify binary made it — fail loudly if missing (maturin include= requires it)
          if ls rust/crates/nedb-py/python/nedb/nedbd-v2* 2>/dev/null; then
            echo "nedbd-v2 binary confirmed in staging area"
          else
            echo "ERROR: nedbd-v2 binary missing from staging area — wheel would lack the binary"
            exit 1
          fi
      - name: Build wheel (maturin)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          working-directory: rust/crates/nedb-py
          args: --release --out ../../../dist
          manylinux: auto
          target: ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.label }}
          path: dist

  publish-native:
    name: Publish native wheels to PyPI
    needs: [wheels]
    runs-on: ubuntu-latest
    # Run even if some wheel jobs failed (e.g. slow Mac runner) — publish whatever built.
    # --skip-existing means partial uploads are safe and idempotent.
    if: startsWith(github.ref, 'refs/tags/') && !cancelled()
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*   # matches wheels-linux-x86_64, wheels-macos-arm64, wheels-macos-x86_64, wheels-windows-x86_64
          merge-multiple: true
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install twine
      - name: Upload native wheels
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing dist/*.whl

  # ----------------------------------------------------------------- npm -----
  # Builds the napi-rs native addon for each platform via @napi-rs/cli.
  # Produces platform-specific .node binaries + the JS/TS shims.
  # Root package.json drives the build; nedb-node/Cargo.toml is the Rust crate.
  # Create the GitHub release on tag push so Codemagic has a release to upload Mac binaries to.
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release (if not exists)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"
          gh release create "$VERSION" --title "$VERSION" --notes "Release $VERSION" \
            --draft=false 2>/dev/null || echo "Release already exists"

  node-binaries:
    name: napi (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [create-release]
    timeout-minutes: 40
    continue-on-error: true
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu  }
          - { os: windows-latest, target: x86_64-pc-windows-msvc    }
          # macOS napi builds handled by Codemagic — uploaded directly to the GitHub release.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install @napi-rs/cli
        run: npm install
      - name: Build native addon
        run: npx napi build --platform --release --target ${{ matrix.target }} --cargo-cwd rust/crates/nedb-node
      - name: Upload .node binary to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for f in *.node; do
            [ -f "$f" ] && gh release upload "${{ github.ref_name }}" "$f" --clobber || true
          done
      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: |
            *.node
            index.js
            index.d.ts

  publish-npm:
    needs: [node-binaries]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && !cancelled()
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Download Linux + Windows napi artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-*
          merge-multiple: true
          path: .
      - name: Wait for Mac binaries from Codemagic (max 35 min)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          echo "Polling GitHub release for Mac .node binaries..."
          for i in $(seq 1 35); do
            ASSETS=$(gh release view "$VERSION" --json assets --jq '[.assets[].name]' 2>/dev/null || echo "[]")
            ARM=$(echo "$ASSETS" | grep -c "darwin-arm64" || true)
            X86=$(echo "$ASSETS" | grep -c "darwin-x64" || true)
            echo "  Attempt $i/35 — arm64=$ARM x86_64=$X86"
            if [ "$ARM" -gt 0 ] && [ "$X86" -gt 0 ]; then
              echo "Mac binaries found — downloading"
              gh release download "$VERSION" --pattern "*.node" --dir . --clobber
              break
            fi
            if [ "$i" -eq 35 ]; then
              echo "Timeout — publishing without Mac binaries (Codemagic may still upload later)"
            fi
            sleep 60
          done
          echo "Final .node files: $(ls *.node 2>/dev/null || echo 'none')"
      - name: Publish to npm (all available platform binaries)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          if echo "$VERSION" | grep -qE '(alpha|beta|rc|pre)'; then
            TAG=$(echo "$VERSION" | grep -oE '(alpha|beta|rc|pre)[.0-9]*' | head -1 | sed 's/[.].*$//')
            npm publish --access public --tag "$TAG"
          else
            npm publish --access public
          fi

  # ---------------------------------------------------------- nedb-engine-client -----
  # Publishes the lightweight HTTP client alongside the engine.
  # Same v* tag ships everything — one workflow, one source of truth.

  client-pypi:
    name: Publish nedb-engine-client to PyPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Smoke test
        run: |
          pip install httpx
          python3 -c "
          import sys; sys.path.insert(0, 'client/python')
          from nedb_client import NedbClient, NedbError
          print('nedb_client import OK:', NedbClient(url='http://127.0.0.1:7070', db='test'))
          "
      - name: Build
        run: |
          pip install --upgrade build twine
          cd client/python
          python -m build
      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd client/python
          twine upload --skip-existing --verbose dist/*

  client-npm:
    name: Publish nedb-engine-client to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Build TypeScript
        run: |
          cd client/node
          npm install
          npx tsc
          mkdir -p dist
          cp dist/index.js dist/index.esm.js
          sed -i 's/^"use strict";//' dist/index.esm.js
          echo "Build complete:"; ls -lh dist/
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd client/node
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "Publishing nedb-engine-client@$VERSION"
          npm publish --access public
