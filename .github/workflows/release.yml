name: release

# Builds NEDB from the single Rust source into cross-platform artifacts and
# publishes to BOTH registries on a version tag:
#   * PyPI  — maturin mixed wheels (native nedb._native + pure-Python nedb) + sdist
#   * npm   — napi-rs prebuilt native addons, package "nedb-engine"
# Publish jobs run only after every build leg is green, so a failed build never
# yields a partial release. Secrets required: PYPI_API_TOKEN, NPM_TOKEN

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------- PyPI -----
  wheels:
    name: wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheels (maturin mixed layout)
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist

  publish-pypi:
    needs: [wheels, sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install twine
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing dist/*

  # ----------------------------------------------------------------- npm -----
  node-binaries:
    name: napi (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: npm install
      - name: Build native addon
        run: npx @napi-rs/cli build --platform --release --target ${{ matrix.target }} --cargo-cwd rust/crates/nedb-node
      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.target }}
          path: |
            *.node
            index.js
            index.d.ts

  publish-npm:
    needs: node-binaries
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - uses: actions/download-artifact@v4
        with:
          pattern: node-*
          merge-multiple: true
          path: .
      - name: List downloaded artifacts
        run: ls -la *.node index.js index.d.ts
      - name: Publish to npm (all platform binaries bundled in one package)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
